
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 Finanzas Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --green: #3ddc84;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  .header p {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 4px;
  }

  .sheet-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* API KEY SECTION */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .api-section label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .api-row {
    display: flex;
    gap: 8px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* TEXT INPUT PANEL */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .input-card label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 14px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }

  textarea::placeholder { color: var(--muted); }

  /* DATE ROW */
  .date-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    align-items: center;
  }

  .date-row label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    margin: 0;
  }

  input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 8px 12px;
    outline: none;
    flex: 1;
  }

  /* PHOTO PANEL */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,255,0.05);
  }

  .drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .drop-zone p { color: var(--muted); font-size: 0.8rem; }
  .drop-zone input { display: none; }

  .preview-img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 12px;
    max-height: 200px;
    object-fit: cover;
  }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #9b59b6);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  input[type="text"], input[type="password"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
  }

  /* PARSED ROWS */
  .parsed-section {
    margin-top: 20px;
  }

  .parsed-title {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .row-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
    transition: border-color 0.2s;
  }

  .row-card.success { border-color: var(--green); }
  .row-card.error { border-color: var(--accent2); }

  .row-card .row-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }

  .row-concept {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    flex: 1;
  }

  .row-amount {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--yellow);
    white-space: nowrap;
  }

  .row-amount.ingreso { color: var(--green); }

  .row-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .tag-tipo { background: rgba(124,106,255,0.2); color: var(--accent); }
  .tag-cuenta { background: rgba(61,220,132,0.15); color: var(--green); }
  .tag-cat { background: rgba(255,209,102,0.15); color: var(--yellow); }
  .tag-estado { background: rgba(255,106,138,0.15); color: var(--accent2); }

  .row-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-group label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field-group select, .field-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 6px 8px;
    outline: none;
    width: 100%;
  }

  .field-group select:focus, .field-group input:focus {
    border-color: var(--accent);
  }

  .field-group input[type="number"] {
    -moz-appearance: textfield;
  }

  .row-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-remove {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-mono);
  }

  .btn-remove:hover { border-color: var(--accent2); color: var(--accent2); }

  .status-icon {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 1.1rem;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 0.8rem;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* SEND ALL */
  .send-section {
    margin-top: 20px;
    position: sticky;
    bottom: 16px;
  }

  .send-section .count {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* HISTORY */
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
  }

  .history-item .h-concept { color: var(--text); font-weight: 500; }
  .history-item .h-meta { color: var(--muted); font-size: 0.65rem; margin-top: 2px; }
  .history-item .h-amount { color: var(--yellow); font-family: var(--font-head); font-weight: 700; }

  .section-title {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    margin-top: 24px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<div class="header">
  <h1>💸 Finanzas Tracker</h1>
  <p>Registra tus gastos · se guarda solo en Google Sheets</p>
  <div class="sheet-status">
    <div class="dot"></div>
    <span id="sheetStatus">Conectado al Sheet</span>
  </div>
</div>

<!-- API KEY -->
<div class="api-section" id="apiSection">
  <label>🔑 Anthropic API Key</label>
  <div class="api-row">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <button class="btn-secondary" onclick="saveApiKey()">Guardar</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('texto', this)">✏️ Texto</button>
  <button class="tab" onclick="switchTab('foto', this)">📷 Foto</button>
  <button class="tab" onclick="switchTab('historial', this)">📋 Historial</button>
</div>

<!-- TEXTO PANEL -->
<div class="panel active" id="panel-texto">
  <div class="input-card">
    <label>Describe tus gastos (uno o varios)</label>
    <textarea id="textoInput" placeholder="Ej: gasté 150 en tacos cash, 500 netflix MP débito, ingresé 2000 de swap a nu débito..."></textarea>
    <div class="date-row">
      <label>Fecha</label>
      <input type="date" id="fechaInput" />
    </div>
  </div>
  <button class="btn-primary" onclick="parsearTexto()" id="btnParsear">
    ⚡ Parsear con IA
  </button>
</div>

<!-- FOTO PANEL -->
<div class="panel" id="panel-foto">
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📸</div>
    <p>Toca para subir foto del ticket</p>
    <p style="margin-top:4px;font-size:0.65rem">JPG, PNG, HEIC</p>
    <input type="file" id="fileInput" accept="image/*" onchange="handleImage(this)">
  </div>
  <img id="previewImg" class="preview-img" style="display:none" />
  <div class="date-row" style="margin-bottom:16px">
    <label>Fecha</label>
    <input type="date" id="fechaFotoInput" />
  </div>
  <button class="btn-primary" onclick="parsearFoto()" id="btnParsearFoto" disabled>
    ⚡ Leer ticket con IA
  </button>
</div>

<!-- HISTORIAL PANEL -->
<div class="panel" id="panel-historial">
  <div class="section-title">Registros enviados hoy</div>
  <div id="historialList">
    <div class="empty-state">Aún no hay registros enviados</div>
  </div>
</div>

<!-- PARSED RESULTS -->
<div class="parsed-section" id="parsedSection" style="display:none">
  <div class="parsed-title" id="parsedTitle">Movimientos detectados</div>
  <div id="parsedRows"></div>
  <div class="send-section">
    <div class="count" id="rowCount"></div>
    <button class="btn-primary" onclick="enviarTodo()" id="btnEnviar">
      🚀 Guardar en Google Sheets
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1WOA5rFxSyT-mM9nrq_M51GpWs6uzG6YX';
const SHEET_NAME = '📋 Flujo Diario';

const CUENTAS = ['Cash','MP Débito','Nu Débito','Azteca Débito','Azteca Guardadito','Albo Digital','Arq Digital','Bancomer Débito','Paypal','Tarjeta Nu','MP Crédito'];
const TIPOS = ['Egreso','Ingreso','Transferencia'];
const CATS_EGRESO = ['Gastos','Servicios','Deudas','Ahorro','Inversion'];
const CATS_INGRESO = ['Swap','Only Fans','Imagen','Extra','Otros'];
const ESTADOS = ['Pagado','Pendiente'];

let parsedData = [];
let historial = JSON.parse(localStorage.getItem('finanzas_historial') || '[]');

// Init
document.getElementById('fechaInput').value = today();
document.getElementById('fechaFotoInput').value = today();
renderHistorial();

const savedKey = localStorage.getItem('anthropic_key');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
  document.getElementById('apiSection').style.borderColor = 'var(--green)';
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('anthropic_key', key);
  document.getElementById('apiSection').style.borderColor = 'var(--green)';
  showToast('✅ API Key guardada', 'success');
}

function getApiKey() {
  return localStorage.getItem('anthropic_key') || document.getElementById('apiKeyInput').value.trim();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name !== 'historial') {
    document.getElementById('parsedSection').style.display = 'none';
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(containerId, msg = 'Procesando con IA...') {
  document.getElementById(containerId).innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      ${msg}
    </div>`;
}

// ---- PARSE TEXT ----
async function parsearTexto() {
  const texto = document.getElementById('textoInput').value.trim();
  const fecha = document.getElementById('fechaInput').value;
  if (!texto) { showToast('Escribe algo primero', 'error'); return; }
  const key = getApiKey();
  if (!key) { showToast('Necesitas tu API Key', 'error'); return; }

  const btn = document.getElementById('btnParsear');
  btn.disabled = true;
  btn.textContent = '⏳ Procesando...';

  document.getElementById('parsedSection').style.display = 'block';
  showLoading('parsedRows', 'Interpretando tus gastos...');

  try {
    const prompt = `Eres un parser de gastos personales. Extrae TODOS los movimientos del siguiente texto y devuelve SOLO un JSON array (sin markdown, sin texto extra).

Fecha por defecto: ${fecha}

Cuentas válidas: ${CUENTAS.join(', ')}
Tipos válidos: Egreso, Ingreso, Transferencia
Categorías egreso: Gastos, Servicios, Deudas, Ahorro, Inversion
Categorías ingreso: Swap, Only Fans, Imagen, Extra, Otros

Para cada movimiento extrae:
- fecha: string DD/MM/YYYY
- tipo: Egreso|Ingreso|Transferencia
- cuenta: cuenta origen (elige la más cercana de la lista)
- cuentaDestino: solo si es Transferencia, sino ""
- estado: Pagado
- categoria: categoría apropiada (vacío "" si es Transferencia)
- concepto: descripción corta del gasto
- monto: número sin símbolos
- comision: 0 si no se menciona

Texto: "${texto}"

Responde SOLO con el JSON array.`;

    const result = await callScript({ action: 'parse', prompt, apiKey: getApiKey() });
    const raw = result.text.replace(/```json|```/g, '').trim();
    parsedData = JSON.parse(raw);
    renderParsed();
  } catch(e) {
    document.getElementById('parsedRows').innerHTML = `<div class="empty-state" style="color:var(--accent2)">Error: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = '⚡ Parsear con IA';
}

// ---- PARSE FOTO ----
let imageBase64 = null;

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewImg').style.display = 'block';
    document.getElementById('btnParsearFoto').disabled = false;
    document.getElementById('dropZone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function parsearFoto() {
  if (!imageBase64) return;
  const fecha = document.getElementById('fechaFotoInput').value;
  const key = getApiKey();
  if (!key) { showToast('Necesitas tu API Key', 'error'); return; }

  const btn = document.getElementById('btnParsearFoto');
  btn.disabled = true;
  btn.textContent = '⏳ Leyendo ticket...';

  document.getElementById('parsedSection').style.display = 'block';
  showLoading('parsedRows', 'Leyendo ticket con IA...');

  try {
    const prompt = `Eres un parser de tickets de compra. Extrae los datos del ticket y devuelve SOLO un JSON array (sin markdown, sin texto extra).

Fecha por defecto si no se ve: ${fecha}

Cuentas válidas: ${CUENTAS.join(', ')} — usa "Cash" si no hay info de pago
Tipos válidos: Egreso, Ingreso, Transferencia

Para cada producto/compra extrae:
- fecha: DD/MM/YYYY
- tipo: Egreso
- cuenta: Cash (default si no hay info)
- cuentaDestino: ""
- estado: Pagado
- categoria: Gastos
- concepto: nombre del producto/comercio
- monto: total del ticket (número)
- comision: 0

Si es un solo ticket, devuelve un array con un solo objeto.

Responde SOLO con el JSON array.`;

    const result = await callScript({ action: 'parse', prompt, apiKey: getApiKey(), imageBase64, mediaType: 'image/jpeg' });
    const raw = result.text.replace(/```json|```/g, '').trim();
    parsedData = JSON.parse(raw);
    renderParsed();
  } catch(e) {
    document.getElementById('parsedRows').innerHTML = `<div class="empty-state" style="color:var(--accent2)">Error: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = '⚡ Leer ticket con IA';
}

// ---- RENDER PARSED ----
function renderParsed() {
  const container = document.getElementById('parsedRows');
  document.getElementById('parsedTitle').textContent = `${parsedData.length} movimiento${parsedData.length !== 1 ? 's' : ''} detectado${parsedData.length !== 1 ? 's' : ''}`;
  document.getElementById('rowCount').textContent = `${parsedData.length} fila${parsedData.length !== 1 ? 's' : ''} listas para enviar`;

  container.innerHTML = parsedData.map((row, i) => {
    const cats = row.tipo === 'Ingreso' ? CATS_INGRESO : CATS_EGRESO;
    const isIngreso = row.tipo === 'Ingreso';
    return `
    <div class="row-card" id="card-${i}">
      <div class="row-header">
        <div class="row-concept">${row.concepto || 'Sin concepto'}</div>
        <div class="row-amount ${isIngreso ? 'ingreso' : ''}">$${Number(row.monto).toLocaleString('es-MX')}</div>
      </div>
      <div class="row-tags">
        <span class="tag tag-tipo">${row.tipo}</span>
        <span class="tag tag-cuenta">${row.cuenta}</span>
        ${row.categoria ? `<span class="tag tag-cat">${row.categoria}</span>` : ''}
        <span class="tag tag-estado">${row.estado}</span>
      </div>
      <div class="row-fields">
        <div class="field-group">
          <label>Fecha</label>
          <input type="date" value="${toInputDate(row.fecha)}" onchange="parsedData[${i}].fecha=fromInputDate(this.value)" />
        </div>
        <div class="field-group">
          <label>Tipo</label>
          <select onchange="parsedData[${i}].tipo=this.value;renderParsed()">
            ${TIPOS.map(t => `<option ${t===row.tipo?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label>Cuenta</label>
          <select onchange="parsedData[${i}].cuenta=this.value">
            ${CUENTAS.map(c => `<option ${c===row.cuenta?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label>Categoría</label>
          <select onchange="parsedData[${i}].categoria=this.value">
            ${(isIngreso ? CATS_INGRESO : CATS_EGRESO).map(c => `<option ${c===row.categoria?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label>Monto</label>
          <input type="number" value="${row.monto}" onchange="parsedData[${i}].monto=this.value" />
        </div>
        <div class="field-group">
          <label>Comisión</label>
          <input type="number" value="${row.comision||0}" onchange="parsedData[${i}].comision=this.value" />
        </div>
      </div>
      <div class="row-actions">
        <button class="btn-remove" onclick="removeRow(${i})">✕ Quitar</button>
      </div>
    </div>`;
  }).join('');
}

function removeRow(i) {
  parsedData.splice(i, 1);
  if (parsedData.length === 0) {
    document.getElementById('parsedSection').style.display = 'none';
  } else {
    renderParsed();
  }
}

function toInputDate(str) {
  if (!str) return today();
  if (str.includes('-')) return str;
  const [d, m, y] = str.split('/');
  return `${y}-${m}-${d}`;
}

function fromInputDate(str) {
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

// ---- APPS SCRIPT URL ----
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYG985nR_jkrY9EieLbRGpQo1cW6gB6NDb6zR7cth_5BlzEvDw_U1lUewytADLbeaqdg/exec';

// Calls Apps Script via form POST to avoid CORS (no-cors gives opaque response, use jsonp pattern)
function callScript(payload) {
  return new Promise((resolve, reject) => {
    const id = 'cb_' + Date.now();
    window[id] = (data) => {
      delete window[id];
      document.getElementById('scriptFrame')?.remove();
      if (data.status === 'ok') resolve(data);
      else reject(new Error(data.message || 'Error en servidor'));
    };
    // Use fetch with a JSONP-like workaround via iframe POST
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
      if (data.status === 'ok') resolve(data);
      else reject(new Error(data.message || 'Error en servidor'));
    })
    .catch(reject);
  });
}

// ---- ENVIAR TODO ----
async function enviarTodo() {
  if (!parsedData.length) return;

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';

  try {
    const rows = parsedData.map(row => {
      const fecha = row.fecha || fromInputDate(today());
      const mes = getMes(fecha);
      const monto = parseFloat(row.monto) || 0;
      const comision = parseFloat(row.comision) || 0;
      const neto = row.tipo === 'Ingreso' ? monto - comision : -(monto + comision);
      return [
        formatFecha(fecha), mes, row.tipo, row.cuenta,
        row.cuentaDestino || '', row.estado || 'Pagado',
        row.categoria || '', row.concepto || '',
        monto, comision, neto, ''
      ];
    });

    await callScript({ action: 'save', rows });

    guardarHistorial(rows);
    parsedData = [];
    document.getElementById('parsedSection').style.display = 'none';
    document.getElementById('textoInput').value = '';
    showToast(`✅ ${rows.length} movimiento${rows.length > 1 ? 's' : ''} guardado${rows.length > 1 ? 's' : ''} en Sheets`, 'success');
    switchTab('historial', document.querySelectorAll('.tab')[2]);

  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '🚀 Guardar en Google Sheets';
}

// ---- HELPERS ----
function getMes(fechaStr) {
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  let d;
  if (fechaStr.includes('/')) {
    const [day, month, year] = fechaStr.split('/');
    d = new Date(year, month - 1, day);
  } else {
    d = new Date(fechaStr);
  }
  return meses[d.getMonth()];
}

function formatFecha(str) {
  if (str.includes('/')) return str;
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function guardarHistorial(rows) {
  rows.forEach(r => {
    historial.unshift({
      fecha: r[0], mes: r[1], tipo: r[2], cuenta: r[3],
      concepto: r[7], monto: r[8], ts: Date.now()
    });
  });
  if (historial.length > 100) historial = historial.slice(0, 100);
  localStorage.setItem('finanzas_historial', JSON.stringify(historial));
  renderHistorial();
}

function renderHistorial() {
  const list = document.getElementById('historialList');
  if (!historial.length) {
    list.innerHTML = '<div class="empty-state">Aún no hay registros enviados</div>';
    return;
  }
  list.innerHTML = historial.slice(0, 30).map(h => `
    <div class="history-item">
      <div>
        <div class="h-concept">${h.concepto || '—'}</div>
        <div class="h-meta">${h.fecha} · ${h.cuenta} · ${h.tipo}</div>
      </div>
      <div class="h-amount">$${Number(h.monto).toLocaleString('es-MX')}</div>
    </div>
  `).join('');
}

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    handleImage(document.getElementById('fileInput'));
  }
});
</script>
